name: DDK Build Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        required: true
        type: string
      ddk_release:
        required: false
        default: '20251016'
        type: string
      module_name:
        required: false
        default: 'android-wuwa'
        type: string

jobs:
  build-module:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Build ${{ inputs.module_name }}.ko
      run: |
        echo "=== 正在为内核版本 ${{ inputs.kmi }} 强行编译驱动 ==="

        # 1. 解决 git 目录权限问题，防止生成 -dirty 后缀
        git config --global --add safe.directory /github/workspace
        
        # 2. 彻底禁用符号版本校验 (解决 modversions 报错)
        # 强行修改内核配置，确保不带 CRC 校验码
        if [ -f $KERNEL_SRC/.config ]; then
          sed -i 's/CONFIG_MODVERSIONS=y/CONFIG_MODVERSIONS=n/g' $KERNEL_SRC/.config
          echo "CONFIG_MODVERSIONS=n" >> $KERNEL_SRC/.config
        fi

        # 3. 强行对齐内核版本号 (解决 -dirty 和版本不匹配)
        # 这里使用你 strings 抓出来的精确字符串
        TARGET_VER="6.12.52-4k-g36e5f6313583"
        echo ">>> 强行注入 Vermagic: $TARGET_VER"

        # 执行编译：覆盖 KERNELRELEASE 变量是成功的关键
        make -j$(nproc) KDIR=$KERNEL_SRC \
             KERNELRELEASE="$TARGET_VER" \
             LOCALVERSION="" \
             CONFIG_MODVERSIONS=n
        
        echo "=== 编译完成 ==="

        # 验证生成的驱动 vermagic 是否干净
        echo ">>> 检查生成的驱动身份证:"
        strings "${{ inputs.module_name }}.ko" | grep "vermagic="

        # 创建输出目录并拷贝
        mkdir -p /github/workspace/out
        OUTPUT_NAME="${{ inputs.module_name }}-${{ inputs.kmi }}.ko"
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$OUTPUT_NAME"

        # 移除调试符号减少体积
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Final Size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.module_name }}-${{ inputs.kmi }}
        path: /github/workspace/out/*.ko
