    - name: Build ${{ inputs.module_name }}.ko
      run: |
        echo "=== Building ${{ inputs.module_name }}.ko for KMI: ${{ inputs.kmi }} ==="

        # 1. 强制清理 git 状态，防止生成 -dirty 后缀
        git config --global --add safe.directory /github/workspace
        
        # 2. 修改内核配置：彻底禁用 MODVERSIONS (解决 modversions 报错)
        # 这一步是为了让驱动变干净，不带 CRC 校验
        sed -i 's/CONFIG_MODVERSIONS=y/CONFIG_MODVERSIONS=n/g' $KERNEL_SRC/.config
        echo "CONFIG_MODVERSIONS=n" >> $KERNEL_SRC/.config

        # 3. 核心修改：强制指定 KERNELRELEASE (解决 -dirty 和版本不匹配)
        # 注意：这里我用了你的 strings 抓出来的版本号截取
        # 只要确保这个字符串和你手机 uname -r 出来的一模一样就行
        TARGET_VER="6.12.52-4k-g36e5f6313583"
        
        echo ">>> Using forced KERNELRELEASE: $TARGET_VER"

        # 执行编译，通过命令行变量覆盖所有干扰项
        make -j$(nproc) KDIR=$KERNEL_SRC \
             KERNELRELEASE="$TARGET_VER" \
             LOCALVERSION="" \
             CONFIG_MODVERSIONS=n
        
        echo "=== Build completed ==="

        # 检查生成的驱动 vermagic 信息
        echo ">>> Checking generated .ko vermagic:"
        strings "${{ inputs.module_name }}.ko" | grep "vermagic="

        # 创建输出目录
        mkdir -p /github/workspace/out
        
        # 命名并拷贝
        OUTPUT_NAME="${{ inputs.inputs.module_name }}-${{ inputs.kmi }}.ko"
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$OUTPUT_NAME"

        # 去除符号表 (注意：strip 之后 vermagic 依然会保留)
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        
        echo "Size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"
